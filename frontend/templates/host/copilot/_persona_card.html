<div class="copilot-persona-card section-card mb-4 border-0 shadow-sm"
     style="background: linear-gradient(135deg, #f0f7ff 0%, #fff 60%);">
    <h3 class="section-title mb-3">
        <i class="bi bi-stars text-warning"></i> Guest Insight
        <span class="badge bg-primary-subtle text-primary ms-auto fw-semibold" style="font-size: 11px;">
            Copilot
        </span>
    </h3>

    <div class="d-flex align-items-center gap-3 mb-3">
        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center flex-shrink-0"
             style="width: 44px; height: 44px;">
            <i class="bi {{ persona.icon }}"></i>
        </div>
        <div>
            <div class="text-muted small fw-bold text-uppercase">Persona</div>
            <div class="fw-bold fs-6">{{ persona.label }}
                <span class="text-primary">({{ persona.confidence }}%)</span>
            </div>
        </div>
    </div>

    <ul class="list-unstyled small mb-3">
        {% for tip in persona.tips %}
        <li class="mb-2 d-flex gap-2">
            <i class="bi bi-check-circle-fill text-success flex-shrink-0"></i>
            <span>{{ tip }}</span>
        </li>
        {% endfor %}
    </ul>

    <div class="bg-white rounded-3 p-3 border mb-3">
        <div class="text-muted small fw-bold mb-1">TIN NHẮN GỢI Ý</div>
        <p class="small mb-0 fst-italic text-secondary" id="copilot-suggested-msg">{{ persona.message }}</p>
    </div>

    <div class="d-flex gap-2 flex-wrap">
        <button type="button" class="btn btn-primary btn-sm fw-semibold"
                onclick="navigator.clipboard.writeText(document.getElementById('copilot-suggested-msg').textContent); this.textContent='Đã copy!';">
            <i class="bi bi-clipboard"></i> Copy tin nhắn
        </button>
        <a href="{{ url_for('message.index') }}" class="btn btn-outline-primary btn-sm fw-semibold">
            <i class="bi bi-chat-dots"></i> Mở tin nhắn
        </a>
    </div>
</div>
