<header class="rovva-header sticky-top">
    <nav class="navbar navbar-expand-lg h-100 py-0">
        <div class="container-fluid px-3 px-lg-4">
            <a class="navbar-brand py-0 me-0" href="{{ url_for('main.index') }}">
                <img src="{{ url_for('static', filename='shared/images/logo.png') }}" alt="Rovva - Smart Stay Platform">
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#rovvaNavbar" aria-controls="rovvaNavbar" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="rovvaNavbar">
                <ul class="navbar-nav align-items-lg-center gap-lg-1">
                    <li class="nav-item">
                        <a class="nav-link rovva-nav-link{% if active_nav == 'dashboard' %} active{% endif %}"
                            href="{{ url_for('main.index') }}">Tổng quan</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link rovva-nav-link{% if active_nav == 'copilot' %} active{% endif %}"
                            href="{{ url_for('copilot.index') }}">
                            <i class="bi bi-stars text-warning"></i> Copilot
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link rovva-nav-link{% if active_nav == 'accommodations' %} active{% endif %}"
                            href="{{ url_for('accommodation.index') }}">Quản lý CSLT</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link rovva-nav-link{% if active_nav == 'bookings' %} active{% endif %}"
                            href="{{ url_for('booking.index') }}">Quản lý booking</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link rovva-nav-link{% if active_nav == 'reports' %} active{% endif %}"
                            href="{{ url_for('report.index') }}">Báo cáo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link rovva-nav-link{% if active_nav == 'disputes' %} active{% endif %}"
                            href="{{ url_for('dispute.index') }}">Tranh chấp</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link rovva-nav-link{% if active_nav == 'payments' %} active{% endif %}"
                            href="{{ url_for('payment.index') }}">Thanh toán</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link rovva-nav-link{% if active_nav == 'messages' %} active{% endif %}"
                            href="{{ url_for('message.index') }}">Tin nhắn</a>
                    </li>
                </ul>
            </div>

            <div class="d-flex align-items-center gap-2 ms-lg-3">
                <button type="button" class="rovva-noti-btn" aria-label="Thông báo">
                    <i class="bi bi-bell-fill" style="font-size: 18px; color: var(--rovva-black-blue);"></i>
                    <span class="rovva-noti-badge"></span>
                </button>
                <a href="{{ url_for('main.profile') }}" class="d-flex align-items-center gap-3 text-decoration-none">
                    <span class="rovva-profile-name d-none d-md-inline">{{ current_user.full_name if current_user.is_authenticated else 'Văn Quản Gia' }}</span>
                    <img src="{{ current_user.avatar_url }}" alt="{{ current_user.full_name }}"
                        class="rovva-avatar">
                </a>
            </div>
        </div>
    </nav>
</header>
