<aside class="admin-sidebar" id="admin-sidebar">
  <a class="admin-sidebar__brand" href="{{ url_for('admin.index') }}">
    <img class="admin-sidebar__logo-img"
         src="{{ url_for('static', filename='customer/images/logos/Logo.jpg') }}"
         alt="Rovva"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="admin-sidebar__logo-fallback" style="display:none"><i class="bi bi-house-heart-fill"></i></div>
    <div class="admin-sidebar__brand-text">
      <span class="admin-sidebar__brand-name">Rovva</span>
      <span class="admin-sidebar__brand-sub">Admin Console</span>
    </div>
  </a>

  <div class="admin-sidebar__scroll">
    {% set ep = request.endpoint %}

    <div class="admin-sidebar__section">Menu</div>
    <nav class="admin-sidebar__nav" aria-label="Menu quản trị">
      <a class="admin-sidebar__link {{ 'is-active' if ep == 'admin.index' else '' }}" href="{{ url_for('admin.index') }}">
        <i class="bi bi-grid-1x2-fill"></i> Dashboard
      </a>
      <a class="admin-sidebar__link {{ 'is-active' if ep == 'admin.bookings' else '' }}" href="{{ url_for('admin.bookings') }}">
        <i class="bi bi-calendar-check-fill"></i> Booking
      </a>
      <a class="admin-sidebar__link {{ 'is-active' if ep == 'admin.payments' else '' }}" href="{{ url_for('admin.payments') }}">
        <i class="bi bi-credit-card-fill"></i> Thanh toán
      </a>
      <a class="admin-sidebar__link {{ 'is-active' if ep == 'admin.disputes' else '' }}" href="{{ url_for('admin.disputes') }}">
        <i class="bi bi-shield-exclamation"></i> Tranh chấp
      </a>
    </nav>

    <div class="admin-sidebar__section">Nội dung</div>
    <nav class="admin-sidebar__nav">
      <a class="admin-sidebar__link {{ 'is-active' if ep == 'admin.customers' else '' }}" href="{{ url_for('admin.customers') }}">
        <i class="bi bi-people-fill"></i> Khách hàng
      </a>
      <a class="admin-sidebar__link {{ 'is-active' if ep == 'admin.hosts' else '' }}" href="{{ url_for('admin.hosts') }}">
        <i class="bi bi-person-badge-fill"></i> Host
      </a>
      <a class="admin-sidebar__link {{ 'is-active' if ep == 'admin.accommodations' else '' }}" href="{{ url_for('admin.accommodations') }}">
        <i class="bi bi-buildings-fill"></i> Cơ sở lưu trú
      </a>
      <a class="admin-sidebar__link {{ 'is-active' if ep == 'admin.rooms' else '' }}" href="{{ url_for('admin.rooms') }}">
        <i class="bi bi-door-open-fill"></i> Phòng
      </a>
      <a class="admin-sidebar__link {{ 'is-active' if ep == 'admin.promotions' else '' }}" href="{{ url_for('admin.promotions') }}">
        <i class="bi bi-tag-fill"></i> Khuyến mãi
      </a>
    </nav>

    <div class="admin-sidebar__section">Hệ thống</div>
    <nav class="admin-sidebar__nav">
      <a class="admin-sidebar__link {{ 'is-active' if ep == 'admin.admins' else '' }}" href="{{ url_for('admin.admins') }}">
        <i class="bi bi-shield-lock-fill"></i> Quản trị viên
      </a>
    </nav>
  </div>

  <div class="admin-sidebar__footer">
    <div class="admin-sidebar__user-card">
      <img src="{{ current_user.avatar_url }}" alt="">
      <div>
        <strong>{{ current_user.full_name }}</strong>
        <span>Quản trị viên</span>
      </div>
    </div>
    <a class="admin-sidebar__link admin-sidebar__link--logout" href="{{ url_for('auth.logout') }}">
      <i class="bi bi-box-arrow-right"></i> Đăng xuất
    </a>
  </div>
</aside>
<div class="admin-overlay" id="admin-overlay"></div>
