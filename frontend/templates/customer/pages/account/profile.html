{% extends 'customer/base.html' %}
{% block body_attrs %}data-page="account"{% endblock %}

{% block content %}
<main class="page-content">
    <div class="account-layout">
      <nav id="account-sidebar" class="account-sidebar" aria-label="Menu tài khoản"></nav>
      <div class="account-main">
        <div class="account-page-head">
          <h1 class="account-page-title">Thông tin tài khoản</h1>
        </div>

        <div class="profile-gold-card">
          <div class="profile-gold-card__avatar-wrap">
            <img id="profile-avatar" class="profile-gold-card__avatar" src="{{ url_for('static', filename='customer/images/avatars/Hinh_avata.jpg') }}" alt="Ảnh đại diện" onerror="this.style.visibility='hidden'">
            <button type="button" class="profile-gold-card__edit" id="profile-avatar-edit" aria-label="Đổi ảnh đại diện">
              <i class="bi bi-pencil"></i>
            </button>
          </div>
          <div>
            <h2 id="profile-display-name" class="profile-gold-card__name">Thành viên Rovva</h2>
            <span id="profile-tier-badge" class="profile-gold-card__tier">
              <i class="bi bi-award-fill"></i> Hạng Vàng
            </span>
          </div>
        </div>

        <div class="profile-form-box">
          <button type="button" class="profile-form-box__edit" id="profile-edit-toggle">
            Chỉnh sửa hồ sơ cá nhân
          </button>

          <form id="profile-form">
            <div class="profile-form-grid">
              <div class="figma-field figma-field--full">
                <label class="figma-field__label" for="field-name-input">Họ và Tên</label>
                <input class="figma-field__box" id="field-name-input" name="name" readonly required>
              </div>

              <div class="figma-field">
                <span class="figma-field__label">Giới tính</span>
                <div class="figma-radio-group" id="field-gender-group">
                  <label class="figma-radio"><input type="radio" name="gender" value="Nam" disabled> Nam</label>
                  <label class="figma-radio"><input type="radio" name="gender" value="Nữ" disabled> Nữ</label>
                  <label class="figma-radio"><input type="radio" name="gender" value="Khác" disabled> Khác</label>
                </div>
              </div>

              <div class="figma-field">
                <label class="figma-field__label" for="field-birthday-input">Ngày sinh</label>
                <input class="figma-field__box" id="field-birthday-input" name="birthday" type="date" readonly>
              </div>

              <div class="figma-field">
                <label class="figma-field__label" for="field-phone-input">Số điện thoại</label>
                <input class="figma-field__box" id="field-phone-input" name="phone" type="tel" readonly>
              </div>

              <div class="figma-field">
                <label class="figma-field__label" for="field-email-input">Địa chỉ email</label>
                <input class="figma-field__box" id="field-email-input" name="email" type="email" readonly>
              </div>

              <div class="figma-field figma-field--full">
                <label class="figma-field__label" for="field-city-input">Thành phố nơi cư trú</label>
                <input class="figma-field__box" id="field-city-input" name="city" readonly>
              </div>
            </div>

            <div class="profile-form-actions d-none" id="profile-form-actions">
              <button type="button" class="profile-cancel-btn" id="profile-edit-cancel">Hủy</button>
              <button type="submit" class="profile-save-btn">
                <i class="bi bi-check-lg"></i> Lưu thay đổi
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
{% endblock %}
