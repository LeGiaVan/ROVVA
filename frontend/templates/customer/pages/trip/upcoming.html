{% extends 'customer/base.html' %}
{% block body_attrs %}data-page="trip"{% endblock %}

{% block content %}
<main class="page-content">
    <div class="account-layout">
      <nav id="account-sidebar" class="account-sidebar" aria-label="Menu tài khoản"></nav>
      <div class="account-main">
        <div class="account-page-head">
          <h1 class="account-page-title">Chuyến đi của tôi</h1>
          <p class="account-page-subtitle">Quản lý và theo dõi các đặt phòng của bạn một cách dễ dàng.</p>
        </div>
        <div class="account-content-box">
          <nav id="trip-tabs" class="account-tabs" aria-label="Trạng thái chuyến đi"></nav>
          <div id="trip-list" class="account-content-box__body">
            <!-- PHASE 3 TASK 6: Cancel Booking -->
            {% if booking is defined and booking.status == 'Đã đặt phòng' %}
              <form action="{{ url_for('customer.cancel_booking', id=booking.id) }}" method="POST">
                  <button type="submit" class="btn btn-danger mt-3">Hủy đặt phòng</button>
              </form>
            {% endif %}
          </div>
        </div>
      </div>
    </div>
  </main>
{% endblock %}
