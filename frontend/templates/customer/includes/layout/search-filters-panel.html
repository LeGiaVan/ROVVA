<aside class="search-filters" aria-label="Bộ lọc tìm kiếm">
  <div class="search-filters__map">
    <img src="{{ url_for('static', filename='customer/images/banners/P1_Dac_quyen&Khuyen_mai.jpg') }}" alt="Bản đồ khu vực">
    <button type="button" class="search-filters__map-btn"><i class="bi bi-geo-alt-fill"></i> Xem trên bản đồ</button>
  </div>
  <button type="button" class="search-filters__clear">Xóa tất cả bộ lọc</button>

  <section class="search-filter-block">
    <h2 class="search-filter-block__title">KHOẢNG GIÁ</h2>
    <div class="search-filter-block__slider">
      <div class="search-filter-block__slider-track">
        <div class="search-filter-block__slider-fill"></div>
      </div>
      <input type="range" class="search-filter-block__range search-filter-block__range--min"
             min="0" max="30000000" value="0" step="100000" aria-label="Giá tối thiểu">
      <input type="range" class="search-filter-block__range search-filter-block__range--max"
             min="0" max="30000000" value="30000000" step="100000" aria-label="Giá tối đa">
    </div>
    <div class="search-filter-block__labels">
      <span>0 ₫</span>
      <span>30.000.000 ₫+</span>
    </div>
    <p class="search-filter-block__input-label">Tối thiểu<span aria-hidden="true"> - </span>Tối đa</p>
    <div class="search-filter-block__inputs">
      <input type="text" class="search-filter-block__input search-filter-block__input--min" value="0" aria-label="Giá tối thiểu">
      <input type="text" class="search-filter-block__input search-filter-block__input--max" value="30.000.000" aria-label="Giá tối đa">

  </section>
